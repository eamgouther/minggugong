        /* 内层亮点（承载点击浮动动画） */
        .highlight-dot .dot-inner {
            width: 100%;

            border-radius: 50%;
            background: #fab209; /* 亮点基础色 */
            /* 点击浮动动画：2秒循环，交替反向，缓动效果 */
            animation: pulse-click 0.5s infinite alternate ease-in-out;
        }
        
        /* 点击浮动+闪烁复合动画 */
        @keyframes pulse-click {
            from {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 15px #fab209, 0 0 30px #fab209, 0 0 5px #fab209;
            }
            to {
                opacity: 0.7;
                transform: scale(1.2);
                box-shadow: 0 0 5px #fab209, 0 0 15px #fab209;
            }
        }
        
        .dot-tip {
            position: absolute;
            top: 50%; /* 与亮点垂直居中对齐 */
            left: calc(100% + 10px); /* 定位到亮点右侧，10px是卡片与亮点的间距，可调整 */
            transform: translateY(-50%); /* 配合top:50%实现垂直居中 */
            width: 50px;
            padding: 5px;
            background: rgba(40, 40, 40, 0.6); /* 灰黑色半透明，最后一个0.8是透明度，可调整 */

		/* ========== 核心优化：最高层级指示图层（重点看） ========== */
        /* 指示图层：最高层级，不阻挡下层交互 */
        .indicator-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900; /* 最高层级 */
        }
        /* 单个指示容器：绝对定位，可单独调整页面位置 */
        .indicator-item {
            position: absolute;
            width: 200px;
            /* background: rgba(255, 255, 255, 0.95); */
            /* border: 2px solid #333; */
			
            border-radius: 8px;
            padding: 0.8rem;
            display: flex;
            flex-direction: column; /* 图片+文字上下排列 */
            align-items: center;
            gap: 0.2rem; /* 图片文字间距 */
            /* box-shadow: 0 3px 10px rgba(0,0,0,0.2); */
        }
        /* 容器内图片+文字样式 */
        .indicator-item img {
			width: 100%;
			height: 150px;
			border-radius: 4px;
			object-fit: contain;
			
			/* border: 1px solid #ccc; */
			margin: 1px 1px; /* 核心修改这一行 */
        }
        .indicator-text {
			
            font-size: 0.9rem;
            color: #333;
            text-align: center;
            line-height: 1.4;
			margin: 5px;
        }

        /* 指示线基础样式：每个容器仅1条，通过ID控制起点/样式 */
        .indicator-item::after {
            content: '';
            position: absolute;
            pointer-events: none;
            background: #8c4600; /* 线的颜色，可单独改 */
            z-index: -1; /* 线在容器下方，不遮挡内容 */
            transition: all 0.3s ease;
			/* 新增：斜线基础设置（宽度设长一点，旋转后更易调整） */
			    width: 90px; /* 线的基础长度，旋转后实际视觉长度会变化 */
			    height: 2px; /* 线的粗细，不变 */
			    transform-origin: 0 50%; /* 旋转原点：线的**起点**（关键！保证绕起点旋转成斜线） */
        }

        /* ========== 关键：单独调整每个容器的【指示线起点】+ 容器页面位置 ========== */
        /* 容器1：页面右上角 + 指示线起点【上边框左20%】 */
        #indicator-1 {
            top: 10%;
            right: 20%; /* 容器在页面的位置，可改top/right/bottom/left */
        }
        #indicator-1::after {
            /* 起点：上边框 + 左20%位置（0%-100%可调） */
            top: 50%;
            left: 95%; 
            /* 线样式：水平向左，长80px，粗2px（可改） */
            /* 终点偏移：向左50px+向上10px（可选，translate(X,Y)） */
            
			transform: rotate(20deg) translate(-25px, 5px); /* rotate(30deg)=顺时针30° */
        }

        /* 容器2：页面中左 + 指示线起点【右边框下70%】 */
        #indicator-2 {
            top: 3%;
            left: 43%;
        }
        #indicator-2::after {
            /* 起点：右边框 + 下70%位置（0%-100%可调） */
            top: 30%;
            right: 0;
            transform: rotate(20deg) translate(47px, -25px);
        }

        /* 容器3：页面中右 + 指示线起点【下边框正中间（50%）】 */
        #indicator-3 {
            top: 35%;
            left: 43%;
        }
        #indicator-3::after {
            /* 起点：下边框 + 正中间50%位置（0%-100%可调） */
            bottom: 70%;
            right: 80%;
            transform: rotate(-20deg) translate(-5px,70px);
        }

        /* 容器4：页面左下角 + 指示线起点【左边框上30%】 */
        #indicator-4 {
            top: 10%;
            left: 20%;
        }
        #indicator-4::after {
            /* 起点：左边框 + 上30%位置（0%-100%可调） */
            top: 30%;
            right: 50%;
            transform: rotate(-20deg) translate(-70px,70px);
        }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取核心元素
            const moveIcon = document.querySelector('.move-icon');
            const funcBtns = document.querySelectorAll('.func-btn');
            const descBox = document.getElementById('descBox');
            const lineIconContainer = document.querySelector('.line-icon-container');
            const btnGroup = document.querySelector('.btn-group'); // 新增：获取按钮容器
        
            // 封装图标定位函数（核心：基于按钮实际位置计算）
            function positionIconToBtn(btn) {
                // 获取按钮的实际位置信息
                const btnRect = btn.getBoundingClientRect();
                // 获取分割线容器的实际位置信息
                const lineContainerRect = lineIconContainer.getBoundingClientRect();
                
                // 计算按钮水平中点（相对于分割线容器）
                // 按钮中点的绝对坐标 - 分割线容器左侧的绝对坐标 = 相对位置
                const btnCenterX = btnRect.left + btnRect.width / 2 - lineContainerRect.left;
                
                // 设置图标位置（transform: translate(-50%) 确保图标自身中点对齐按钮中点）
                moveIcon.style.left = `${btnCenterX}px`;
            }
        
            // 按钮点击核心逻辑
            function handleBtnClick(btn) {
                // 显示并赋值文字
                const descText = btn.getAttribute('data-text');
                descBox.style.display = 'flex';
                descBox.textContent = descText;
        
                // 精准定位图标到按钮正中间
                positionIconToBtn(btn);
        
                // 按钮激活样式
                funcBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        
            // 给所有按钮绑定点击事件
            funcBtns.forEach((btn) => {
                btn.addEventListener('click', () => handleBtnClick(btn));
            });
        
            // 初始化：默认触发第一个按钮逻辑（文字+图标）
            if (funcBtns.length > 0) {
                handleBtnClick(funcBtns[0]);
                
                // 兜底：窗口大小变化时重新定位（防止响应式错位）
                window.addEventListener('resize', () => {
                    // 找到当前激活的按钮，重新定位图标
                    const activeBtn = document.querySelector('.func-btn.active') || funcBtns[0];
                    positionIconToBtn(activeBtn);
                });
            }
        });
    </script>
