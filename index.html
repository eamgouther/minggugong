<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明故宫首页</title>
    <style>
        /* 全局样式：适配古风主题，全屏背景+点击反馈 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url("img/a明故宫首页.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            cursor: pointer;
            transition: background-color 0.3s ease;
            user-select: none;
            font-family: "仿宋", "楷体", serif; 
            color: #fff;
            /* 开启弹性布局，方便居中定位 */
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20%;
        }

        /* 点击时的背景暗化反馈（增强交互感） */
        body:active {
            background-color: rgba(0, 0, 0, 0.2);
        }
		
		/* 标题容器：实现主副标题横向排列，竖向文字 */
		.title-container {
		    display: flex;
		    align-items: center;
		    opacity: 0; /* 初始隐藏，通过JS渐显 */
		    animation: fadeInContainer 0.5s ease forwards;
			transform: translateY(-140px); 
			margin-left: 120px;
		}
		
		/* 主标题样式：竖排、渐显 */
		.main-title {
		  color: #733900;
		  font-size: 115px;
		  font-weight: bold;
		  font-family: "agency fb","隶书";
		  /* 竖排文字设置 */
		  writing-mode: vertical-rl;
		  text-orientation: upright;
		  /* 逐字渐显动画 */
		  opacity: 0;
		  animation: fadeInMain 1.5s ease 0.2s forwards;
		}
		
		/* 副标题容器：包裹两列副标题，实现横向排列 */
		.sub-title-wrapper {
		    display: flex;
		    margin-left: 40px;
		}
		
		/* 副标题样式：竖排、右侧、渐显 */
		.sub-title {
		  color: #733900;
		  font-size: 36px;
		  font-weight: bold;
		  font-family: "agency fb","隶书";
		  /* 竖排文字设置 */
		  writing-mode: vertical-rl;
		  text-orientation: upright;
		  /* 两列之间的间距 */
		  margin-left: 60px;
		  /* 逐字渐显动画 */
		  opacity: 0;
		  animation: fadeInSub 1.5s ease 1s forwards;
		}
		
		/* 引导文字样式 */
		.sub-text {
		    position: fixed;
		    bottom: 10vh;
		    left: 50%;
		    transform: translateX(-50%);
		    font-size: 25px;
		    text-shadow: 1px 1px 2px #000;
		    opacity: 0.7;
			color: #bab08d;
		}

        /* 容器渐显动画 */
        @keyframes fadeInContainer {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 主标题渐显动画 */
        @keyframes fadeInMain {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 副标题渐显动画 */
        @keyframes fadeInSub {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body id="homePage">
    <!-- 标题容器 -->
    <div class="title-container">
        <h1 class="main-title">金陵皇苑迹</h1>
        <!-- 副标题容器：拆分两列 -->
		
        <div class="sub-title-wrapper">
            <p class="sub-title">千载间帝都肇建之基</p>
			<br><br><br><br><br>
            <p class="sub-title">一宫承日月同辉之象</p>
        </div>
    </div>

    <!-- 引导文字 -->
    <div class="sub-text">点击页面任意处进入</div>
    
    <script>
        // 核心逻辑：监听页面点击事件，跳转至下一页
        document.getElementById('homePage').addEventListener('click', function() {
            window.location.href = "导航.html";
        });

        // 可选：阻止点击文字时的默认选中行为（优化体验）
        document.querySelectorAll('div, h1, p').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
