<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>横向交互时间轴</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "agency fb","隶书",sans-serif;
       background-image: url("img/a明故宫内页.png");
       background-size: cover;
       background-position: center;
       color: #733900;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 4vh 5vw 0;
    }

    /* 上方展示容器 */
    .content-stage {
      position: absolute;
      left: 50%;
      top: 22%;
      transform: translateX(-50%);
      width: 90vw;
      height: 44vh;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      opacity: 0;
      transform: scale(0.88);
      filter: blur(10px);
      transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
      pointer-events: none;
    }

    .panel.active {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
      pointer-events: auto;
      z-index: 2;
    }

    .panel.leaving {
      opacity: 0;
      transform: scale(0.82);
      filter: blur(12px);
      z-index: 1;
    }

    .image-box,
    .text-box {
      height: 100%;
      /* border-radius: 10px; */
      overflow: hidden;
      /* background: rgba(255,255,255,0.05); */
      border: 1px solid rgba(255,255,255,0.08);
     /* box-shadow: 0 20px 60px rgba(0,0,0,0.35); */
      backdrop-filter: blur(8px);
    }
    
    .image-box {
    	background: url(img/043.png);
    	background-size: 100% 100%;
    	padding: 15px;
      margin-left: 170px;
      width: 40%;
      position: relative;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(15,23,42,0.15), rgba(2,6,23,0.45));
    }

    .text-box {
    	margin-right: 140px;
      background: url("img/037.png") no-repeat center center;
      background-size: 100% 100%;
      width: 30%;
      padding: 30px 10px 10px 20px;
      display: flex;
      flex-direction: column;
      /* justify-content: center; */
    }
    .tag {
      display: inline-flex;
      align-self: flex-start;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(96,165,250,0.16);
      color: #733900;
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 40px;
      margin-left: 10px;
    }

    .text-box h2 {
      text-align: center;
      margin: 0 0 14px;
      font-size: 32px;
      line-height: 1.2;
    }
    
    .text-box .time-line {
    	text-align: center;
      color: #733900;
      font-size: 18px;
      margin-bottom: 6px;
    }
    
    .text-box p {
    	text-indent: 2em;
      margin: 0;
      color: #733900;
      font-size: 17px;
      line-height: 1.9;
    }

    /* 底部时间轴 */
    .timeline-section {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10%;
      height: 180px;
      overflow: hidden;
    }

    .timeline-rail {
      position: absolute;
      left: 0;
      right: 0;
      top: 84px;
      height: 3px;
      background: rgba(115, 57, 0, 0.45)
    }

    .timeline-window {
      position: absolute;
      inset: 0 5vw;
      overflow: hidden;
    }

    .timeline-track {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .timeline-item {
      position: relative;
      width: 220px;
      flex: 0 0 220px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .timeline-item.active::after {
      /* background: #60a5fa;
      box-shadow: 0 0 0 10px rgba(96,165,250,0.16); */
      transform: translate(-50%, -50%) scale(1.25);
    }

    .time-label {
      position: absolute;
      left: 50%;
      top: 84px;
      font-size: 18px;
      font-weight: 600;
      color: #733900;
      letter-spacing: 1px;
      padding: 6px 14px;
      
      background-image: url(img/24.png);
      background-size: 100% 100%;
      background-position: center;
      transform: translate(-50%, -50%);
      z-index: 3;
      transition: all 0.4s ease;
    }

    .place-label {
		width: 150px;
      position: absolute;
      left:50%;
      top: 108px;
      font-size: 18px;
      color: #733900;
      transform-origin: center;
      transform: translateX(-50%) rotate(-30deg);
      transition: all 0.4s ease;
    }

    .time-label {
      top: 84px;
      font-size: 18px;
      font-weight: 600;
      color: #733900;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 12px;
      background-image: url(img/24.png);
      background-size: 100% 100%;
      background-position: center;
      transform: translate(-50%, -50%);
      z-index: 3;
      transition: all 0.4s ease;
    }

    .place-label {
      top: 118px;
      font-size: 18px;
      color: #733900;
    }

    .timeline-item.active .time-label {
      color: #7f0000;
      background-image: url(img/25.png);
      transform: translate(-50%, calc(-50% - 25px)) scale(1.25); /* 整体容器轻微上移 */
      /* box-shadow: 0 8px 20px rgba(56,189,248,0.35); */
      background-size: 100% 100%;
    }

    .timeline-item.active .place-label {
		  text-align: center;
      top: 1px;
      color: #a62525;
      font-weight: 600;
      transform: translateX(-50%) rotate(0deg);
    }

    

    .hint {
      position: absolute;
      left: 5vw;
      bottom: calc(30% - 56px);
      font-size: 13px;
      color: rgba(255,255,255,0.48);
      letter-spacing: 0.5px;
    }

    @media (max-width: 1200px) {
      .panel { gap: 16px; }
      .image-box { width: 58%; }
      .text-box { width: 36%; }
      .timeline-item { width: 200px; flex-basis: 200px; }
    }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .page { min-height: 100vh; height: auto; padding-bottom: 80px; }
      .content-stage {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        width: 100%;
        height: auto;
      }
      .panel,
      .panel.active,
      .panel.leaving {
        position: relative;
        opacity: 1;
        transform: none;
        filter: none;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }
      .image-box,
      .text-box {
        width: 100%;
        min-height: 240px;
      }
      .timeline-section {
        position: relative;
        bottom: auto;
        margin-top: 24px;
      }
      .hint {
        position: relative;
        left: auto;
        bottom: auto;
        margin: 12px 5vw 0;
      }
    }

	    width: 100%;
	    text-align: center;
	    margin-bottom: 80px;
	    position: relative;
	}
	.title{
	    color: #333;
	    font-size: 80px;
	    font-weight: 400;
	    margin: 0;

	    /* 背景图层（单独用于旋转） */
	    .btn-bg {
	      position: absolute;
	      top: 0;
	      left: 0;
	      width: 100%;
	      height: 100%;
	      background: url("img/027.png") no-repeat center center; /* 替换为你的按钮背景图 */
	      background-size: cover;

	    /* 文字层（静止） */
	    .btn-text {
	      position: relative;
	      z-index: 2; /* 文字在背景上方 */
	    }
	
	    /* hover时背景旋转，文字不动 */
	    .back-home-btn:hover .btn-bg {
	      transform: rotate(360deg); /* 360度旋转，可改为180deg */
	    }
  </style>

    let activeIndex = 0;

    function createPanels() {
      timelineData.forEach((item, index) => {
        const panel = document.createElement('div');
        panel.className = index === 0 ? 'panel active' : 'panel';
        panel.dataset.index = index;
        panel.innerHTML = `
          <div class="image-box">
            <img src="${item.image}" alt="${item.title}">
            <div class="image-overlay"></div>
          </div>
          <div class="text-box">
            
            <h2>${item.title}</h2>
            <div class="time-line">${item.subtitle}</div>
            <p>${item.desc}</p>
          </div>
        `;
        contentStage.appendChild(panel);
      });
    }

    function createTimeline() {
      timelineData.forEach((item, index) => {
        const node = document.createElement('div');
        node.className = index === 0 ? 'timeline-item active' : 'timeline-item';
        node.dataset.index = index;
        node.innerHTML = `
          <div class="time-label ${index === 0 ? 'move-down' : ''}">${item.time}</div>
          <div class="place-label">${item.location}</div>
        `;
        node.addEventListener('click', () => activateNode(index));
        timelineTrack.appendChild(node);
      });
    }

    function getStartIndex(index) {
      if (index <= 1) return 0;
      const maxStart = Math.max(0, timelineData.length - VISIBLE_COUNT);
      return Math.min(index - 1, maxStart);
    }

    function updateTrackPosition() {
      const startIndex = getStartIndex(activeIndex);
      timelineTrack.style.transform = `translateX(${-startIndex * ITEM_WIDTH}px)`;
    }

    function updateActiveNode() {
      const items = [...document.querySelectorAll('.timeline-item')];
      items.forEach((item, idx) => {
        const timeLabel = item.querySelector('.time-label');
        item.classList.toggle('active', idx === activeIndex);
        if (idx === activeIndex) {
          timeLabel.classList.add('move-down');
        } else {
          timeLabel.classList.remove('move-down');
        }
      });
    }

    function switchPanel(nextIndex) {
      const panels = [...document.querySelectorAll('.panel')];
      const nextPanel = panels[nextIndex];
      const currentPanel = panels[previousIndex];

      if (currentPanel && currentPanel !== nextPanel) {
        currentPanel.classList.remove('active');
        currentPanel.classList.add('leaving');
      }

      nextPanel.classList.add('active');
      nextPanel.classList.remove('leaving');

      panels.forEach((panel, idx) => {
        if (idx !== nextIndex && idx !== previousIndex) {
          panel.classList.remove('active', 'leaving');
        }
      });

      if (currentPanel) {
        setTimeout(() => {
          currentPanel.classList.remove('leaving');
        }, 520);
      }
    }

    function activateNode(index) {
      if (index === activeIndex) return;
      previousIndex = activeIndex;
      activeIndex = index;
      updateActiveNode();
      updateTrackPosition();
      switchPanel(index);
    }

    // 新增：点击空白区域实现左右回看
    timelineWindow.addEventListener('click', (e) => {
      // 如果点的是节点本身，不处理（节点已有 click）
      if (e.target.closest('.timeline-item')) return;

      const rect = timelineWindow.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const width = rect.width;

      // 左侧区域：向前
      if (x < width * 0.3) {
        const newIndex = Math.max(0, activeIndex - 1);
        activateNode(newIndex);
      }

      // 右侧区域：向后
      else if (x > width * 0.7) {
        const newIndex = Math.min(timelineData.length - 1, activeIndex + 1);
        activateNode(newIndex);
      }
    });

    function initTrackWidth() {
      timelineTrack.style.width = `${timelineData.length * ITEM_WIDTH}px`;
    }

    createPanels();
    createTimeline();
    initTrackWidth();
    updateTrackPosition();

    window.addEventListener('resize', updateTrackPosition);
  </script>
</body>
</html>
